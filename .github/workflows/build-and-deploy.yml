
name: CI/CD Process
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Compile Android
    runs-on: ubuntu-latest
    concurrency:
      group: build-android-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
        with:
          allow-snapshots: false
          min-wrapper-count: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run ktlint
        run: ./gradlew ktlintCheck
      
      - name: Compile Android Kotlin
        run: ./gradlew composeApp:compileDebugKotlinAndroid

  build-ios:
    name: Compile iOS
    runs-on: macos-latest
    concurrency:
      group: build-ios-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Compile iOS Kotlin
        run: ./gradlew composeApp:compileKotlinIosSimulatorArm64

  success:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify that there were no failures
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}